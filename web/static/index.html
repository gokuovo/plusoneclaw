<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlusOneClaw</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0f0f0f;
  --surface: #1a1a1a;
  --surface2: #242424;
  --border: #333;
  --text: #e0e0e0;
  --text-dim: #888;
  --accent: #7c6ef0;
  --accent-hover: #6b5ce0;
  --user-bg: #2a2540;
  --assistant-bg: #1e1e1e;
  --error: #e05555;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
}

/* Header */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 20px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}
header h1 { font-size: 16px; font-weight: 600; }
.model-select {
  display: flex;
  align-items: center;
  gap: 8px;
}
.model-select label { font-size: 13px; color: var(--text-dim); }
.model-select select {
  background: var(--surface2);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 5px 10px;
  font-size: 13px;
  cursor: pointer;
  outline: none;
}
.model-select select:focus { border-color: var(--accent); }

/* Chat area */
#chat {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.msg {
  max-width: 780px;
  width: 100%;
  margin: 0 auto;
  padding: 14px 18px;
  border-radius: 12px;
  line-height: 1.6;
  font-size: 14px;
  white-space: pre-wrap;
  word-break: break-word;
}
.msg.user {
  background: var(--user-bg);
  align-self: flex-end;
  border-bottom-right-radius: 4px;
}
.msg.assistant {
  background: var(--assistant-bg);
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
}
.msg.error {
  background: #2a1515;
  border: 1px solid var(--error);
  color: var(--error);
}
.msg .role {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-dim);
  margin-bottom: 6px;
}
.msg.user .role { color: var(--accent); }

/* Code blocks */
.msg pre {
  background: #111;
  border-radius: 6px;
  padding: 10px 14px;
  margin: 8px 0;
  overflow-x: auto;
  font-size: 13px;
}
.msg code {
  font-family: "SF Mono", "Fira Code", Consolas, monospace;
  font-size: 13px;
}
.msg p { margin: 6px 0; }
.msg .md h1, .msg .md h2, .msg .md h3, .msg .md h4, .msg .md h5, .msg .md h6 { margin: 10px 0 6px; line-height: 1.35; }
.msg .md h1 { font-size: 20px; }
.msg .md h2 { font-size: 18px; }
.msg .md h3 { font-size: 16px; }
.msg .md ul { margin: 6px 0 6px 20px; }
.msg .md li { margin: 2px 0; }
.msg .md a { color: #9da2ff; text-decoration: none; }
.msg .md a:hover { text-decoration: underline; }

/* Thinking indicator */
.thinking {
  max-width: 780px;
  width: 100%;
  margin: 0 auto;
  padding: 14px 18px;
  color: var(--text-dim);
  font-size: 13px;
  display: none;
}
.thinking.active { display: flex; align-items: center; gap: 8px; }
.thinking .dots span {
  display: inline-block;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--text-dim);
  animation: dot-pulse 1.4s infinite;
}
.thinking .dots span:nth-child(2) { animation-delay: 0.2s; }
.thinking .dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes dot-pulse {
  0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
  40% { opacity: 1; transform: scale(1); }
}

/* Input area */
.input-area {
  border-top: 1px solid var(--border);
  background: var(--surface);
  padding: 16px 20px;
}
.input-wrap {
  max-width: 780px;
  margin: 0 auto;
  display: flex;
  gap: 10px;
}
#input {
  flex: 1;
  background: var(--surface2);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 16px;
  font-size: 14px;
  font-family: inherit;
  resize: none;
  outline: none;
  min-height: 24px;
  max-height: 200px;
  line-height: 1.5;
}
#input:focus { border-color: var(--accent); }
#input::placeholder { color: var(--text-dim); }
#send {
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 10px;
  padding: 0 20px;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.15s;
  align-self: flex-end;
  height: 44px;
}
#send:hover { background: var(--accent-hover); }
#send:disabled { opacity: 0.5; cursor: not-allowed; }
</style>
</head>
<body>

<header>
  <h1>PlusOneClaw</h1>
  <div class="model-select">
    <label for="model">Model:</label>
    <select id="model"></select>
  </div>
</header>

<div id="chat"></div>
<div class="thinking" id="thinking">
  <div class="dots"><span></span><span></span><span></span></div>
  <span>Thinking...</span>
</div>

<div class="input-area">
  <div class="input-wrap">
    <textarea id="input" rows="1" placeholder="输入消息..." autofocus></textarea>
    <button id="send">发送</button>
  </div>
</div>

<script>
const chatEl = document.getElementById('chat');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('send');
const thinkingEl = document.getElementById('thinking');
const modelSelect = document.getElementById('model');
let isComposing = false;
let lastCompositionEndAt = 0;

// Auto-resize textarea
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 200) + 'px';
});

// Enter to send, Shift+Enter for newline
inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    const inComposition = isComposing || e.isComposing || e.keyCode === 229 || e.key === 'Process';
    const justCommittedComposition = Date.now() - lastCompositionEndAt < 80;
    if (inComposition || justCommittedComposition) {
      e.preventDefault();
      return;
    }
    e.preventDefault();
    sendMessage();
  }
});
inputEl.addEventListener('compositionstart', () => { isComposing = true; });
inputEl.addEventListener('compositionend', () => {
  isComposing = false;
  lastCompositionEndAt = Date.now();
});
sendBtn.addEventListener('click', sendMessage);

// Load models
async function loadModels() {
  try {
    const res = await fetch('/api/models');
    const data = await res.json();
    modelSelect.innerHTML = '';
    data.models.forEach(m => {
      const opt = document.createElement('option');
      opt.value = m.name;
      opt.textContent = `${m.name} (${m.model})`;
      if (m.name === data.current) opt.selected = true;
      modelSelect.appendChild(opt);
    });
  } catch (e) {
    console.error('Failed to load models:', e);
  }
}

// Switch model
modelSelect.addEventListener('change', async () => {
  try {
    const res = await fetch('/api/models', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: modelSelect.value }),
    });
    if (!res.ok) {
      const data = await res.json();
      addMessage('error', data.error || 'Failed to switch model');
    }
  } catch (e) {
    addMessage('error', 'Failed to switch model');
  }
});

function addMessage(role, content) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const roleLabel = document.createElement('div');
  roleLabel.className = 'role';
  roleLabel.textContent = role === 'user' ? 'You' : role === 'error' ? 'Error' : 'Assistant';
  div.appendChild(roleLabel);

  const body = document.createElement('div');
  body.className = 'md';
  body.innerHTML = renderMarkdown(content);
  div.appendChild(body);

  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
}

function escapeHtml(text) {
  return text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function renderInline(text) {
  return text
    .replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/__(.+?)__/g, '<strong>$1</strong>')
    .replace(/(^|[\s(])\*(.+?)\*(?=[\s).,!?:;]|$)/g, '$1<em>$2</em>')
    .replace(/(^|[\s(])_(.+?)_(?=[\s).,!?:;]|$)/g, '$1<em>$2</em>')
    .replace(/`([^`\n]+)`/g, '<code>$1</code>');
}

function renderMarkdown(raw) {
  const text = String(raw ?? '');
  const codeBlocks = [];
  let escaped = escapeHtml(text).replace(/```([a-zA-Z0-9_-]+)?\n([\s\S]*?)```/g, (_, lang, code) => {
    const token = `@@CODE_BLOCK_${codeBlocks.length}@@`;
    const cls = lang ? ` class="language-${lang}"` : '';
    codeBlocks.push(`<pre><code${cls}>${code}</code></pre>`);
    return token;
  });

  const lines = escaped.split('\n');
  const parts = [];
  let inList = false;

  const closeList = () => {
    if (inList) {
      parts.push('</ul>');
      inList = false;
    }
  };

  for (const line of lines) {
    const trimmed = line.trim();
    const heading = line.match(/^(#{1,6})\s+(.+)$/);
    const item = line.match(/^[-*]\s+(.+)$/);

    if (trimmed === '') {
      closeList();
      continue;
    }

    if (/^@@CODE_BLOCK_\d+@@$/.test(trimmed)) {
      closeList();
      parts.push(trimmed);
      continue;
    }

    if (heading) {
      closeList();
      const level = heading[1].length;
      parts.push(`<h${level}>${renderInline(heading[2])}</h${level}>`);
      continue;
    }

    if (item) {
      if (!inList) {
        parts.push('<ul>');
        inList = true;
      }
      parts.push(`<li>${renderInline(item[1])}</li>`);
      continue;
    }

    closeList();
    parts.push(`<p>${renderInline(line)}</p>`);
  }

  closeList();
  let html = parts.join('');
  html = html.replace(/@@CODE_BLOCK_(\d+)@@/g, (_, i) => codeBlocks[Number(i)] || '');
  return html;
}

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text) return;

  inputEl.value = '';
  inputEl.style.height = 'auto';
  sendBtn.disabled = true;
  addMessage('user', text);
  thinkingEl.classList.add('active');

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text }),
    });
    const data = await res.json();
    if (data.error) {
      addMessage('error', data.error);
    } else {
      addMessage('assistant', data.response);
    }
  } catch (e) {
    addMessage('error', `Request failed: ${e.message}`);
  } finally {
    thinkingEl.classList.remove('active');
    sendBtn.disabled = false;
    inputEl.focus();
  }
}

loadModels();
</script>
</body>
</html>
